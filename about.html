<style>

    .middle-section{
    margin-top: 30px;
    display: flex;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 1px solid #ddd; 
    background-image: url(image/BG\ 4.JPG);
     background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;

}
.offerings-section{
    flex: 1;
    padding: 30px;
}
.offerings-section h2{
    text-align: center;
    color: burlywood;
    font-size: larger;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: bolder;
    font-size: x-large;
}
.offerings-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}
.offering-item{
    text-align: center;
}
.offering-item img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 50%;
    border: solid burlywood;
    margin: 0 auto 10px auto;
}
.offering-item p {
    font-weight: bold;
    margin: 0;
    color: white;
    font-size: 1.1em;
}
.cake-variants {
    font-size: 0.85rem;
    font-weight: normal;
    color: white;
}
.HEADER{
    position: sticky;
    background-color: #1B2431;
    border-radius: 10px;
    margin-top: 0px;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
    z-index: 1000;
}
a{
    text-decoration: none;
    color: white;
}
.logo{
    height: 60px;
}
h5{
    margin-top: 19px;
    color: white;
}
ul{
    list-style-type: none;
    display: flex;
    gap: 40px;
    padding-right: 20px;
}


    @media(max-width:768px) { 
 body {
        min-width: fit-content; 
        overflow-x: auto;  
    }
        
    }
</style>
