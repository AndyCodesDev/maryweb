<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarySite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>







    <div class="submit">
        <span>Thank You</span><br>
        <span>Your order has been submitted!!</span><br> 
        <i class="fa-solid fa-envelope-circle-check fa-8x " style="color: #f06292;"></i>
        <p>We've sent a confirmation email to your inbox. Our bakers are already getting to work-we'll notify you the moment your treats are boxed up and ready! </p>
        <a href="index.html" style="text-decoration: none; color: white;"><button>Back to Menu</button></a>
    </div>

    <style>

        body{
           background-color: white;
            text-align: center;
        }
        .submit{
            justify-self: center;
            width: 500px;
            background-color: #fff5f5;
            padding: 15px;
            font-family: 'Times New Roman', Times, serif;
            margin-top: 100px;
            box-shadow:  0 4px 15px rgba(0,0,0,0.1);
        }
        .submit span{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 800;
            font-size: x-large;
            color: #880e4f;
        }
        .submit p{
            font-weight: 600;
            font-family: Arial, Helvetica, sans-serif;
            color: #3E2723;
        }
        .submit button {
        background-color: #5D4037;
        color: white;
        border: none;
        padding: 15px 35px;       
        border-radius: 25px;     
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease; 
        }


        .submit button:hover {
        background-color: #3E2723; 
        }




       
@media screen and (max-width: 768px) {
    .submit{
        width: 90%;
        margin-top: 50px;
        padding: 20px;
        margin: 50px;
    }
    .submit span{
        font-size: 1.5em;

    }
}

    </style>
    




</body>
</html>
